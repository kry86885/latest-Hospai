services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    env_file:
      - ./backend/.env
    environment:
      - PORT=5001
      - DB_ENGINE=postgres
      - DATABASE_URL=${DATABASE_URL}
      - FLASK_ENV=development
      - SESSION_COOKIE_SECURE=false
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-http://localhost:5001}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5001}
      - VITE_SYMPTOM_API_BASE=${VITE_SYMPTOM_API_BASE:-http://localhost:5002}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  marketing-site:
    build:
      context: .
      dockerfile: site/Dockerfile.dev
    environment:
      - VITE_APP_URL=${VITE_APP_URL:-http://localhost:5173}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "4173:4173"
    volumes:
      - ./site:/app/site
      - site_node_modules:/app/site/node_modules
    restart: unless-stopped

  frontend_node_modules:
  site_node_modules:
