services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 5001
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DATABASE_URL: ${DATABASE_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.hospai.ai,https://staging-app.hospai.ai,http://localhost:5173,http://127.0.0.1:5173}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hospai_session}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      SESSION_PEPPER: ${SESSION_PEPPER:-change-this-to-a-long-random-secret}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      ADMIN_ROUTE_PASSWORD: ${ADMIN_ROUTE_PASSWORD:-change-this-admin-route-password}
      ADMIN_ROUTE_AUTH_COOKIE_NAME: ${ADMIN_ROUTE_AUTH_COOKIE_NAME:-hospai_admin_route_auth}
      ADMIN_ROUTE_AUTH_TTL_SECONDS: ${ADMIN_ROUTE_AUTH_TTL_SECONDS:-3600}
      ADMIN_ROUTE_AUTH_SECRET: ${ADMIN_ROUTE_AUTH_SECRET:-change-this-admin-route-cookie-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      BUCKET_URL: ${BUCKET_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    expose:
      - "5001"
    volumes:
      - backend_data:/data
      - backend_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:?Set VITE_API_BASE to your public backend URL}
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL to your public backend URL}
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
      symptom-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  marketing-site:
    build:
      context: .
      dockerfile: site/Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:?Set VITE_APP_URL to your public app URL}
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
